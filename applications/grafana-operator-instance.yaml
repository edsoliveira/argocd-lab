apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-operator-instance
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/edsoliveira/argocd-lab
    targetRevision: main
    path: workloads/grafana
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
