apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: grafana
    targetRevision: 7.3.9
    helm:
      values: |
        service:
          type: ClusterIP
        grafana.ini:
          server:
            root_url: http://grafana.local:8080
          branding:
            app_title: "Grafana GitOps Lab"  

        ingress:
          enabled: true
          ingressClassName: nginx
          hosts:
            - grafana.local
          paths:
            - path: /
              pathType: Prefix

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
